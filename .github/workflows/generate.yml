name: Generate Xinwenlianbo Markdown

on:
  schedule:
    # Beijing evening run. Avoid exact hours because GitHub scheduled
    # workflows can be delayed or dropped during high-load minutes.
    - cron: "15 21 * * *"
      timezone: "Asia/Shanghai"
  workflow_dispatch:
    inputs:
      date:
        description: "Optional broadcast date, YYYY-MM-DD. Empty uses Beijing rule: before 20:00 yesterday, from 20:00 today."
        required: false
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest

      - name: Print trigger context
        run: |
          echo "event=${{ github.event_name }}"
          echo "schedule=${{ github.event.schedule }}"
          echo "requested_date=${{ github.event.inputs.date }}"
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S %Z')"
          echo "Beijing now: $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S %Z')"

      - name: Generate markdown
        env:
          REQUESTED_DATE: ${{ github.event.inputs.date }}
        run: |
          DATE_ARGS=()
          if [ -n "$REQUESTED_DATE" ]; then
            DATE_ARGS=(--date "$REQUESTED_DATE")
          fi
          for attempt in 1 2 3 4; do
            if python scripts/generate_xwlb.py "${DATE_ARGS[@]}" --out-dir generated --repo Ranphanie/xinwenlianbo-md --branch main --obsidian-vault 新闻联播; then
              exit 0
            fi
            if [ "$attempt" = "4" ]; then
              break
            fi
            echo "Attempt ${attempt} failed; waiting before retry..."
            sleep 600
          done
          exit 1

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated
          if git diff --cached --quiet; then
            echo "No generated changes."
          else
            git commit -m "Update Xinwenlianbo markdown"
            git push
          fi
