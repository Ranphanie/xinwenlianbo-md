name: Generate Xinwenlianbo Markdown

on:
  schedule:
    # 21:30 Beijing time. GitHub Actions cron uses UTC.
    - cron: "30 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest

      - name: Generate markdown
        run: |
          for attempt in 1 2 3 4 5 6; do
            if python scripts/generate_xwlb.py --out-dir generated --repo Ranphanie/xinwenlianbo-md --branch main --obsidian-vault 新闻联播; then
              exit 0
            fi
            echo "Attempt ${attempt} failed; waiting before retry..."
            sleep 600
          done
          exit 1

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated
          if git diff --cached --quiet; then
            echo "No generated changes."
          else
            git commit -m "Update Xinwenlianbo markdown"
            git push
          fi
